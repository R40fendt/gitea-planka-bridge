version: "3.9"

services:
  webhook:
    image: python:3.14-slim
    working_dir: /app

    environment:
      PLANKA_URL: https://planka.ritzenbergen.de/
      PLANKA_USER: test
      PLANKA_PASSWORD: R3Af$6U#oB

    volumes:
      - .:/app

    ports:
      - "8093:8093"

    command: >
      sh -c "
      pip install --no-cache-dir watchdog &&
      pip install --no-cache-dir -r requirements.txt &&
      watchmedo auto-restart
      --patterns='*.py'
      --recursive
      -- python -u main.py
      "

    restart: unless-stopped
    depends_on:
      - db

  db:
    image: mysql:8.0

    environment:
      MYSQL_ROOT_PASSWORD: app
      MYSQL_DATABASE: app 
      MYSQL_USER: app
      MYSQL_PASSWORD: app

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    restart: unless-stopped

volumes:
  mysql_data:
